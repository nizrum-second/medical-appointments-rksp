upstream backend_cluster {
    server backend1:8000 max_fails=2 fail_timeout=10s;
    server backend2:8000 max_fails=2 fail_timeout=10s;
    server backend3:8000 max_fails=2 fail_timeout=10s;
}

server {
    listen 80;

    location / {
        proxy_pass http://backend_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_intercept_errors on;
        error_page 502 503 504 /service_unavailable.html;
    }

    location = /service_unavailable.html {
        default_type application/json;
        return 503 '{"detail":"service temporarily unavailable"}';
    }
}


