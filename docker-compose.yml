services:
  backend1:
    build: ./backend
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=library_db
      - JWT_SECRET_KEY=your-secret-key-change-in-production
      - DATABASE_URL=postgresql://user:password@database:5432/library_db
    ports:
      - '8001:8000'
    depends_on:
      database:
        condition: service_healthy
    networks:
      - library
    volumes:
      - ./backend:/app
    restart: on-failure

  backend2:
    build: ./backend
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=library_db
      - JWT_SECRET_KEY=your-secret-key-change-in-production
      - DATABASE_URL=postgresql://user:password@database:5432/library_db
    ports:
      - '8002:8000'
    depends_on:
      database:
        condition: service_healthy
    networks:
      - library
    volumes:
      - ./backend:/app
    restart: on-failure

  backend3:
    build: ./backend
    environment:
      - DB_HOST=database
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=library_db
      - JWT_SECRET_KEY=your-secret-key-change-in-production
      - DATABASE_URL=postgresql://user:password@database:5432/library_db
    ports:
      - '8003:8000'
    depends_on:
      database:
        condition: service_healthy
    networks:
      - library
    volumes:
      - ./backend:/app
    restart: on-failure

  # frontend:
  #   build: ./frontend
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   ports:
  #     - '5173:5173'
  #   environment:
  #     - VITE_API_URL=http://localhost:8000/api/v1
  #     - VITE_APP_NAME=Clinic Management System
  #   depends_on:
  #     - nginx
  #   networks:
  #     - library

  database:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    networks:
      - library
    volumes:
      - ./database/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  # adminer:
  #   image: adminer
  #   container_name: adminer
  #   restart: always
  #   ports:
  #     - '8080:8080'
  #   networks:
  #     - library
  #   depends_on:
  #     - database

  nginx:
    image: nginx:alpine
    networks:
      - library
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend1
      - backend2
      - backend3
    restart: on-failure

networks:
  library:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
